# nginx config for local podman frontend.
# Browser hits this on :80 (mapped to host :3000). Static SPA assets served
# directly; /api/* is reverse-proxied to the SSM tunnel running on the
# operator's laptop at host.containers.internal:8080.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → SSM tunnel → AWS head node
    location /api/ {
        proxy_pass http://host.containers.internal:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;       # sbatch can be slow under load
        client_max_body_size 100m;     # presigned-URL uploads go direct to S3
    }
}
