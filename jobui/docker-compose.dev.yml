# Local development compose — NOT used in production.
# Production uses the compose generated by head-node user-data.
# For local dev you need a local MySQL + Valkey (use `docker run ... mysql:8` + `docker run ... valkey`).
services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      AWS_REGION: us-east-1
      TEAM_NAME: dev
      S3_BUCKET: dev-bucket
      ECR_REGISTRY: 000000000000.dkr.ecr.us-east-1.amazonaws.com
      AURORA_WRITER_ENDPOINT: host.docker.internal
      AURORA_READER_ENDPOINT: host.docker.internal
      AURORA_JOBUI_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:000000000000:secret:dev-aurora-jobui-xxx"
      VALKEY_ENDPOINT: host.docker.internal
      JWT_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:000000000000:secret:dev-jwt-xxx"
      ADMIN_TEMP_SECRET_ARN: "arn:aws:secretsmanager:us-east-1:000000000000:secret:dev-admin-xxx"
      USERS_SEED_PARAMETER: /dev/users-seed
      ADMIN_EMAIL: dev@example.com
      GPU_FAMILY_SPEC: '{}'
    # You'll need to pass AWS creds for Secrets Manager lookups:
    # volumes:
    #   - ~/.aws:/root/.aws:ro

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
